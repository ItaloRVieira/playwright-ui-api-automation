name: UI and API Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Instalar browsers Playwright
        run: npx playwright install --with-deps

      - name: Criar pastas de evidências
        run: |
          mkdir -p evidencias/ui/reports/html
          mkdir -p evidencias/api/reports

      - name: Rodar testes de UI
        id: ui_tests
        continue-on-error: true
        run: npm run test

      - name: Rodar testes de API com Newman
        id: api_tests
        continue-on-error: true
        run: npm run test:api:report

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            evidencias/ui/reports/html/
            test-results/
          retention-days: 30

      - name: Upload relatório API Newman
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-api-report
          path: evidencias/api/reports/
          retention-days: 30

      - name: Validar resultado final da execução
        if: always()
        run: |
          echo "Resultado UI: ${{ steps.ui_tests.outcome }}"
          echo "Resultado API: ${{ steps.api_tests.outcome }}"

          if [ "${{ steps.ui_tests.outcome }}" != "success" ] || [ "${{ steps.api_tests.outcome }}" != "success" ]; then
            echo "Uma ou mais suítes de teste falharam."
            exit 1
          fi